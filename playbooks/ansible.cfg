[defaults]
host_key_checking = False
interpreter_python = /usr/bin/python3
deprecation_warnings = False
force_valid_group_names = ignore
inventory = inventories/prod/groups.ini, inventories/prod/hosts.ini
inventory_enabled = auto, ini, yaml, host_list, script
forks = 20
display_skipped_hosts = false

[ssh_connection]
pipelining = True
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
ansible_ssh_common_args='-o ConnectTimeout=3 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'